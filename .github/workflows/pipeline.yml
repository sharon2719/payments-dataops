name: Payments DataOps Pipeline

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1-5'  # 6am UTC weekdays
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install duckdb pandas faker dbt-duckdb great-expectations groq

      - name: Generate transactions
        run: python data/generate_transactions.py

      - name: Run dbt models
        working-directory: dbt_project/payments
        run: dbt run --profiles-dir .

      - name: Run dbt tests
        working-directory: dbt_project/payments
        run: dbt test --profiles-dir .

      - name: Run Great Expectations validation
        run: python tests/validate_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "Daily pipeline update $(date +'%Y-%m-%d')" || echo "No changes"
          git push